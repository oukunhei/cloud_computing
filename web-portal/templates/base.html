<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}K3s Lab Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-grid-3x3-gap-fill me-2"></i>K3s Lab Platform
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tenants"><i class="bi bi-people me-1"></i>Tenants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/kubeconfig"><i class="bi bi-key me-1"></i>Kubeconfig</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/permissions"><i class="bi bi-shield-lock me-1"></i>Permissions</a>
                    </li>
                </ul>
                <span class="navbar-text" id="k8s-status">
                    <span class="badge bg-secondary"><i class="bi bi-circle"></i> Checking...</span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-3 border-top mt-auto">
        <small>Multi-Tenant K3s Lab Platform | RBAC & Resource Isolation</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
