name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint -d relaxed -d "{rules: {line-length: disable}}" rbac/ resources/ networkpolicies/ demo/

      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck onboard-team.sh scripts/*.sh web-portal/entrypoint.sh

      - name: Run flake8
        run: |
          pip install flake8
          flake8 web-portal/ \
            --max-line-length=200 \
            --ignore=E501,W503,E128,E741,E241,F401 \
            --exclude=__pycache__,.git
